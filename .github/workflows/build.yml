name: Build & Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version tag (e.g. v1.0.0)"
        required: true
        default: "v1.0.0"

permissions:
  contents: write

jobs:
  build:
    name: Build DittoMac
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Swift version
        run: swift --version

      - name: Resolve dependencies
        run: swift package resolve

      - name: Build release binary
        run: swift build -c release

      - name: Package .app bundle
        run: |
          APP=DittoMac.app
          rm -rf "$APP"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Resources"
          cp .build/release/DittoMac "$APP/Contents/MacOS/"
          cp Info.plist "$APP/Contents/"
          printf 'APPLDiMc' > "$APP/Contents/PkgInfo"
          # Intentionally NOT code-signed.
          # Ad-hoc signing changes the TCC identity every build, causing
          # repeated Accessibility permission prompts. Unsigned apps are
          # tracked by bundle path in TCC, so the grant persists across updates.
          # Users remove quarantine with xattr -dr after downloading.

      - name: Create DMG
        run: |
          mkdir -p dmg_staging
          cp -r DittoMac.app dmg_staging/
          ln -s /Applications dmg_staging/Applications
          hdiutil create \
            -volname "DittoMac" \
            -srcfolder dmg_staging \
            -ov -format UDZO \
            DittoMac.dmg
          DMG_SIZE=$(du -sh DittoMac.dmg | cut -f1)
          echo "dmg_size=$DMG_SIZE" >> "$GITHUB_ENV"
          rm -rf dmg_staging DittoMac.app .build

      - name: Generate release notes
        id: notes
        run: |
          TAG="${{ github.event.inputs.version }}"
          PREV=$(git tag --sort=-version:refname | grep -v "^$TAG$" | head -1)
          if [ -z "$PREV" ]; then
            RANGE="HEAD"
            HEADER="Initial release"
          else
            RANGE="${PREV}..HEAD"
            HEADER="Changes since $PREV"
          fi
          COMMITS=$(git log "$RANGE" --pretty=format:"- %s (%h)" 2>/dev/null || echo "- Initial release")
          BODY=$(cat <<NOTES
          ## $HEADER

          $COMMITS

          ---

          ### Install

          1. Download **DittoMac.dmg** and open it
          2. Drag **DittoMac.app** to your Applications folder
          3. Remove the macOS quarantine flag (required for unsigned apps):
          \`\`\`bash
          xattr -dr com.apple.quarantine /Applications/DittoMac.app
          \`\`\`
          4. Open DittoMac — grant **Accessibility** permission when prompted

          **Asset:** \`DittoMac.dmg\` (${{ env.dmg_size }})
          NOTES
          )
          echo "body<<EOF" >> "$GITHUB_OUTPUT"
          echo "$BODY"    >> "$GITHUB_OUTPUT"
          echo "EOF"      >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.version }}
          name: DittoMac ${{ github.event.inputs.version }}
          body: ${{ steps.notes.outputs.body }}
          files: DittoMac.dmg
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
